aid: dsl
name: DSL
description: >-
  A Domain-Specific Language (DSL) is a programming language or specification
  language dedicated to a particular problem domain, a particular problem
  representation technique, or a particular solution technique. DSLs allow
  domain experts to express solutions in terms of the problem domain rather
  than the implementation domain.
